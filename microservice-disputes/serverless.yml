org: testeocloudcomputing
app: kambiop2p
service: kambiop2p-disputes

provider:
  name: aws
  runtime: python3.9
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  iam:
    role: arn:aws:iam::${aws:accountId}:role/LabRole
  httpApi:
    cors: true
  environment:
    DISPUTES_TABLE: ${self:service}-${self:provider.stage}-disputes
    TRADES_TABLE: kambiop2p-transactions-${self:provider.stage}-trades

functions:
  openDispute:
    handler: handler.open_dispute
    events:
      - http:
          path: disputes/open
          method: post
          cors: true

  getDispute:
    handler: handler.get_dispute
    events:
      - http:
          path: disputes/{id}
          method: get
          cors: true

  resolveDispute:
    handler: handler.resolve_dispute
    events:
      - http:
          path: disputes/{id}/resolve
          method: post
          cors: true

  getUserDisputes:
    handler: handler.get_user_disputes
    events:
      - http:
          path: disputes/user
          method: get
          cors: true

  getAllDisputes:
    handler: handler.get_all_disputes
    events:
      - http:
          path: disputes/all
          method: get
          cors: true

resources:
  Resources:
    DisputesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.DISPUTES_TABLE}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
          - AttributeName: trade_id
            AttributeType: S
          - AttributeName: reporter_id
            AttributeType: S
          - AttributeName: created_at
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: TradeDisputesIndex
            KeySchema:
              - AttributeName: trade_id
                KeyType: HASH
            Projection:
              ProjectionType: ALL
          - IndexName: UserDisputesIndex
            KeySchema:
              - AttributeName: reporter_id
                KeyType: HASH
              - AttributeName: created_at
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
